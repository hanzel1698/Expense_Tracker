name: Android Build and Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode and write keystore
  run: |
    if [ -z "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
      echo "Error: DEBUG_KEYSTORE_BASE64 secret is not set"
      exit 1
    fi
    echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > debug.keystore
    if [ ! -f debug.keystore ] || [ ! -s debug.keystore ]; then
      echo "Error: Failed to decode keystore or file is empty"
      exit 1
    fi
  shell: bash

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_FILE: debug.keystore
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android

      - name: Extract version from gradle
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: List build outputs
        run: find app/build/outputs -type f -name "*.apk" || echo "No APK files found"

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/*.apk"
          tag: v${{ steps.version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: false
          body: "Release v${{ steps.version.outputs.version }}"
